name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore websocket-sharp.sln

      - name: Build
        run: dotnet build websocket-sharp.sln -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Unit tests
        run: dotnet test tests/WebSocketSharp.Tests/WebSocketSharp.Tests.csproj -c Release --no-build --no-restore

      - name: Stress tests
        run: dotnet test tests/WebSocketSharp.StressTests/WebSocketSharp.StressTests.csproj -c Release --no-build --no-restore --filter TestCategory=Stress

      - name: Verify release package
        shell: pwsh
        run: |
          $fileVersion = (Get-Item '.\websocket-sharp\bin\Release\net472\websocket-sharp.dll').VersionInfo.FileVersion
          $version = $fileVersion -replace '\.0$', ''
          .\scripts\Build-Release.ps1 `
            -Version $version `
            -OutputDirectory "$env:RUNNER_TEMP\websocket-sharp-package-proof" `
            -SkipBuild
